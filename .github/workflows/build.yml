# ═══════════════════════════════════════════════════════════════════
# OmniHub – GitHub Actions Build & Release  v0.3.0
# Trigger: Manuell (workflow_dispatch) oder Tag v*
# ═══════════════════════════════════════════════════════════════════

name: Build & Release OmniHub

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: 'GitHub-Release erstellen?'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-windows:
    name: Build (Windows x64)
    runs-on: windows-latest

    steps:
      # ── Checkout ────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Node.js (OHNE npm-cache – kein package-lock.json nötig) ────
      - name: Node.js 20 einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ── Rust (stable) ───────────────────────────────────────────────
      - name: Rust stable installieren
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      # ── Rust-Cache ──────────────────────────────────────────────────
      - name: Rust-Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true

      # ── Node-Abhängigkeiten (npm install, nicht npm ci) ─────────────
      - name: Node-Abhängigkeiten installieren
        run: npm install

      # ── Version auslesen ────────────────────────────────────────────
      - name: Version auslesen
        id: version
        shell: pwsh
        run: |
          $ver = (Get-Content package.json | ConvertFrom-Json).version
          echo "version=$ver" >> $env:GITHUB_OUTPUT
          Write-Host "Baue OmniHub v$ver..."

      # ── Tauri Build + Release ────────────────────────────────────────
      - name: Tauri Build & Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN:       ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY:  ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          tagName:        v${{ steps.version.outputs.version }}
          releaseName:    'OmniHub v${{ steps.version.outputs.version }}'
          releaseBody:    |
            ## OmniHub v${{ steps.version.outputs.version }}

            ### 📥 Installation
            Lade die `.exe` herunter und führe den Installer aus.
            WideVine ist durch Edge WebView bereits eingebaut – kein Setup nötig!

            ### 💬 Support & Feedback
            - [Discord-Server](https://discord.gg/tnfgta33uj)
            - [GitHub Issues](https://github.com/P3rc1v4l/OmniHub/issues)
          releaseDraft:   false
          prerelease:     false
          includeUpdaterJson: true
        if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.create_release == 'true'

      # ── Nur Artefakt (kein Release) ─────────────────────────────────
      - name: Artefakt hochladen (kein Release)
        if: github.event.inputs.create_release == 'false' && !startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: OmniHub-v${{ steps.version.outputs.version }}-windows
          path: src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 7
