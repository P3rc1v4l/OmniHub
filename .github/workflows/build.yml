# ═══════════════════════════════════════════════════════════════════
# OmniHub – GitHub Actions Build & Release  v0.3.4
# ─────────────────────────────────────────────────────────────────
# Build-Speed Strategie:
#
#   1. Cargo.lock cachen (stabile Cache-Keys)
#      → Cargo.lock wird nach dem ersten Generieren gecacht
#      → Nächster Build restauriert es → gleiche Dep-Versionen
#      → Swatinem/rust-cache bekommt stabilen Key
#
#   2. cache-targets: true (compiled .rlib Dateien)
#      → Gesamtes target/ Verzeichnis wird gecacht (~800MB-1.5GB)
#      → Nächster Build: nur noch eigener Code wird neu kompiliert
#      → ~1-2 Min statt 5-7 Min
#
#   3. sccache (Fallback-Cache für einzelne Compilation Units)
#
# Erwartete Zeiten:
#   Erster Build:  ~8-10 Min (alles neu, Caches werden befüllt)
#   Folge-Builds:  ~2-3 Min  (target/ + Cargo.lock gecacht)
# ═══════════════════════════════════════════════════════════════════

name: Build & Release OmniHub

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: 'GitHub-Release erstellen?'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER:       "sccache"

jobs:
  build-windows:
    name: Build (Windows x64)
    runs-on: windows-latest

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. sccache (Compilation Unit Cache) ─────────────────────────
      - name: sccache einrichten
        uses: mozilla-actions/sccache-action@v0.0.9

      # ── 3. Node.js ──────────────────────────────────────────────────
      - name: Node.js 20 einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ── 4. Rust stable ──────────────────────────────────────────────
      - name: Rust stable installieren
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      # ── 5. Cargo.lock wiederherstellen oder generieren ───────────────
      #    Key = Hash von Cargo.toml → stabil solange sich Deps nicht ändern
      - name: Cargo.lock Cache wiederherstellen
        id: cargo-lock-cache
        uses: actions/cache@v4
        with:
          path: src-tauri/Cargo.lock
          key: cargo-lock-${{ hashFiles('src-tauri/Cargo.toml') }}

      - name: Cargo.lock generieren (nur wenn nicht gecacht)
        if: steps.cargo-lock-cache.outputs.cache-hit != 'true'
        working-directory: src-tauri
        run: cargo generate-lockfile

      # ── 6. Rust-Cache (Registry + compiled target/) ─────────────────
      #    NACH Cargo.lock-Restore → stabiler Cache-Key
      - name: Rust-Cache (Registry + Target)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces:     src-tauri
          cache-on-failure: true
          cache-targets:  true
          # Shared-Key: alle Builds teilen sich den gleichen Cache
          shared-key:     "omnihub-windows"

      # ── 7. Node-Abhängigkeiten ──────────────────────────────────────
      - name: Node-Abhängigkeiten installieren
        run: npm install

      # ── 8. Version auslesen ─────────────────────────────────────────
      - name: Version auslesen
        id: version
        shell: pwsh
        run: |
          $ver = (Get-Content package.json | ConvertFrom-Json).version
          echo "version=$ver" >> $env:GITHUB_OUTPUT
          Write-Host "Baue OmniHub v$ver..."

      # ── 9. Tauri Build + Release ────────────────────────────────────
      - name: Tauri Build & Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN:       ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY:  ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          RUSTC_WRAPPER:      sccache
        with:
          tagName:        v${{ steps.version.outputs.version }}
          releaseName:    'OmniHub v${{ steps.version.outputs.version }}'
          releaseBody:    |
            ## OmniHub v${{ steps.version.outputs.version }}

            ### 📥 Installation
            Lade die `.exe` herunter und führe den Installer aus.
            WideVine ist durch Edge WebView bereits eingebaut – kein Setup nötig!

            ### 💬 Support & Feedback
            - [Discord-Server](https://discord.gg/tnfgta33uj)
            - [GitHub Issues](https://github.com/P3rc1v4l/OmniHub/issues)
          releaseDraft:   false
          prerelease:     false
          includeUpdaterJson: true
        if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.create_release == 'true'

      # ── 10. sccache Statistiken ─────────────────────────────────────
      - name: sccache Statistiken
        run: sccache --show-stats
        if: always()

      # ── 11. Artefakt ohne Release ───────────────────────────────────
      - name: Artefakt hochladen (kein Release)
        if: github.event.inputs.create_release == 'false' && !startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: OmniHub-v${{ steps.version.outputs.version }}-windows
          path: src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 7
