<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>OmniHub</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a0f;display:flex;align-items:center;justify-content:center;flex-direction:column;font-family:'Segoe UI',system-ui,sans-serif;-webkit-app-region:drag}
canvas{position:fixed;inset:0;z-index:0}
.wrap{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:24px;animation:fadeIn .6s ease forwards}
@keyframes fadeIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
.logo-wrap{position:relative;width:120px;height:120px;display:flex;align-items:center;justify-content:center}
.ring{position:absolute;inset:0;border-radius:50%;border:2px solid transparent}
.ring1{border-top-color:#30c5bb;border-right-color:rgba(48,197,187,.3);animation:spin 2s linear infinite}
.ring2{inset:8px;border-top-color:rgba(48,197,187,.5);border-left-color:rgba(48,197,187,.2);animation:spinr 1.5s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes spinr{to{transform:rotate(-360deg)}}
.logo{width:80px;height:80px;object-fit:contain;z-index:2;position:relative;animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{filter:drop-shadow(0 0 8px rgba(48,197,187,.6))}50%{filter:drop-shadow(0 0 20px rgba(48,197,187,.9))}}
.name{font-size:28px;font-weight:700;letter-spacing:.2em;color:#f0f0f8;text-transform:uppercase}
.name span{color:#30c5bb}
.sub{font-size:12px;color:rgba(240,240,248,.3);letter-spacing:.3em;text-transform:uppercase;margin-top:4px;text-align:center}
.bar-wrap{width:200px;height:2px;background:rgba(48,197,187,.15);border-radius:999px;overflow:hidden;margin-top:8px}
.bar{height:100%;background:linear-gradient(to right,#30c5bb,#5de8e0);border-radius:999px;width:0;animation:progress 2.4s ease forwards}
@keyframes progress{0%{width:0}60%{width:70%}100%{width:100%}}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="wrap">
  <div class="logo-wrap">
    <div class="ring ring1"></div>
    <div class="ring ring2"></div>
    <img class="logo" src="assets/icon.png" alt="OmniHub"/>
  </div>
  <div>
    <div class="name">OMNI<span>HUB</span></div>
    <div class="sub">Dein Streaming-Hub</div>
  </div>
  <div class="bar-wrap"><div class="bar"></div></div>
</div>
<script>
const c=document.getElementById('c'),ctx=c.getContext('2d');
let w=c.width=innerWidth,h=c.height=innerHeight;
const pts=Array.from({length:40},()=>({x:Math.random()*w,y:Math.random()*h,r:Math.random()*1.5+.3,vx:(Math.random()-.5)*.6,vy:(Math.random()-.5)*.6,op:Math.random()*.4+.05}));
function tick(){ctx.clearRect(0,0,w,h);pts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=w;if(p.x>w)p.x=0;if(p.y<0)p.y=h;if(p.y>h)p.y=0;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(48,197,187,${p.op})`;ctx.fill()});requestAnimationFrame(tick)}
tick();
// Navigation zur Haupt-App
setTimeout(()=>{window.location.href='index.html';},3000);
if(window.__TAURI__){
  window.__TAURI__.event.listen('splash-done',()=>{window.location.href='index.html';}).catch(()=>{});
}
</script>
</body>
</html>
